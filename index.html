<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Surprise</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        overflow:hidden;
    }

    .page{
        display:none;
        text-align:center;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        width:90%;
        max-width:500px;
        animation:fade 0.5s ease;
    }

    .active{
        display:block;
    }

    h1{
        margin-bottom:25px;
        color:#ff4d6d;
        font-size:2rem;
    }

    button{
        padding:12px 25px;
        margin:10px;
        border:none;
        border-radius:30px;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
    }

    .yes{
        background:#28a745;
        color:white;
    }

    .yes:hover{
        background:#218838;
        transform:scale(1.05);
    }

    .no{
        background:#dc3545;
        color:white;
    }

    .no:hover{
        background:#c82333;
        transform:scale(1.05);
    }

    .retry{
        background:#007bff;
        color:white;
    }

    .retry:hover{
        background:#0056b3;
        transform:scale(1.05);
    }

    @keyframes fade{
        from{
            opacity:0;
            transform:scale(0.9);
        }
        to{
            opacity:1;
            transform:scale(1);
        }
    }
</style>
</head>

<body>

<!-- FIRST PAGE -->
<div id="page1" class="page active">
    <h1>🎁 Please Accept The Gift 🎁</h1>

    <button class="yes" onclick="acceptGift()">Yes ❤️</button>
    <button class="no" onclick="showNoPage()">No 😒</button>
</div>

<!-- SECOND PAGE -->
<div id="page2" class="page">
    <h1>😤 How Dare You! 😤</h1>
    <p style="font-size:20px; margin-bottom:25px;">
        Try Again!
    </p>

    <button class="retry" onclick="goBack()">Go Back 🔁</button>
</div>

<script>
    function showNoPage(){
        document.getElementById("page1").classList.remove("active");
        document.getElementById("page2").classList.add("active");
    }

    function goBack(){
        document.getElementById("page2").classList.remove("active");
        document.getElementById("page1").classList.add("active");
    }

    function acceptGift(){
        window.open(
            "https://youtu.be/oYuQyApYNWQ?si=ZiH3juBZXvTGXBH8",
            "_blank"
        );
    }
</script>

</body>
</html>
